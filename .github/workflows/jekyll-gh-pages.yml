# Replaces the default dynamic "pages build and deployment" workflow with pinned
# action versions on Node 24-capable releases. See:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

# Opt in JavaScript actions still on Node 20 (e.g. deploy-pages@v4) until upstream tags node24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
